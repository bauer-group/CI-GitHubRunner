name: 🚀 Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force-release:
        description: 'force create release'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-compose:
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-compose.yml@main
    with:
      # Both files validated; app-auth.yml is the override active when
      # GitHub App auth is configured, base + override is the production combo.
      compose-files: '["docker-compose.yml", "docker-compose.app-auth.yml"]'
      env-template: |
        {
          "STACK_NAME": "github-runner-test",
          "TIME_ZONE": "Etc/UTC",
          "GITHUB_ACCESS_TOKEN": "ghp_test_token_placeholder",
          "ORG_NAME": "test-org",
          "RUNNER_SCOPE": "org",
          "RUNNER_NAME_PREFIX": "self-hosted",
          "RUNNER_GROUP": "Default",
          "RUNNER_LABELS": "docker",
          "RUNNER_IMAGE_TAG": "latest",
          "AGENT_STOP_GRACE": "5m",
          "DIND_IMAGE": "dind",
          "APP_PRIVATE_KEY_FILE": "./github-app.pem"
        }

  validate-scripts:
    uses: bauer-group/automation-templates/.github/workflows/modules-validate-shellscript.yml@main
    with:
      scan-directory: '.'
      severity: 'error'

  release:
    needs: [validate-compose, validate-scripts]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.validate-compose.outputs.valid == 'true' &&
      needs.validate-scripts.outputs.passed == 'true'
    uses: bauer-group/automation-templates/.github/workflows/modules-semantic-release.yml@main
    with:
      target-branch: 'main'
      dry-run: false
      force-release: ${{ inputs.force-release || false }}
    secrets: inherit
