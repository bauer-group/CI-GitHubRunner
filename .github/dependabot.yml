# =============================================================================
# Dependabot Configuration
# =============================================================================
# Monitors Docker images, Dockerfile bases, Python dependencies and
# GitHub Actions for updates. Combined with docker-maintenance.yml
# workflow for auto-merge and release of Docker base-image bumps.
# =============================================================================

version: 2
updates:
  # ---------------------------------------------------------------------------
  # docker-compose.yml image references (agent, dind, watchtower)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "dependabot"
    commit-message:
      prefix: "fix(docker)"
      include: "scope"
    open-pull-requests-limit: 5

  # ---------------------------------------------------------------------------
  # cleanup-manager Dockerfile base image (python:X.Y-alpine)
  # Dependabot's docker ecosystem is not recursive; needs an explicit
  # entry per directory containing a Dockerfile.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/src/cleanup-manager"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
      - "cleanup-manager"
      - "dependabot"
    commit-message:
      prefix: "fix(cleanup-manager)"
      include: "scope"
    open-pull-requests-limit: 3

  # ---------------------------------------------------------------------------
  # cleanup-manager Python dependencies
  # PyJWT[crypto] in particular gets meaningful security updates -
  # the underlying `cryptography` library has a steady stream of CVEs.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/src/cleanup-manager"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "python"
      - "cleanup-manager"
      - "dependabot"
    commit-message:
      prefix: "fix(cleanup-manager)"
      include: "scope"
    open-pull-requests-limit: 5
    # Group non-security patch/minor bumps to reduce PR noise; security
    # advisories still arrive as individual PRs immediately.
    groups:
      cleanup-manager-deps:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # GitHub Actions updates (reusable workflow refs, runner actions)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
      - "dependabot"
    commit-message:
      prefix: "chore(ci)"
