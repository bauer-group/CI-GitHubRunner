# =============================================================================
# GitHub Runner - Self-Hosted with Docker-in-Docker
# =============================================================================
# High-performance ephemeral GitHub Actions runners
# Uses myoung34/github-runner with isolated DinD container
#
# Usage:
#   docker compose up -d
#
# Scale runners (shared DinD):
#   docker compose up -d --scale agent=4
# =============================================================================

name: ${STACK_NAME:-github-runner}

services:
  # ---------------------------------------------------------------------------
  # Docker-in-Docker Daemon
  # ---------------------------------------------------------------------------
  docker-in-docker:
    image: docker:${DIND_IMAGE:-dind}
    container_name: ${STACK_NAME:-github-runner}-container
    hostname: docker-in-docker
    privileged: true
    restart: unless-stopped
    # Generous grace period: DinD must let in-flight builds drain (otherwise
    # the runner agent sees a sudden DOCKER_HOST disconnect mid-job and dies
    # without deregistering, leaking an offline runner).
    stop_grace_period: 120s
    labels:
      # Opt-in for the optional `auto-update` profile. Inert when the profile
      # is not active. See env var COMPOSE_PROFILES in .env.example.
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKER_DRIVER: ${DOCKER_STORAGE_DRIVER:-overlay2}
    command:
      - dockerd
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
      - --tls=false
      - --storage-driver=${DOCKER_STORAGE_DRIVER:-overlay2}
      - --mtu=${DOCKER_MTU:-1500}
      - --max-concurrent-downloads=20
      - --max-concurrent-uploads=10
    volumes:
      - dind-data:/var/lib/docker
    networks:
      - runner-network
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${DIND_CPU_LIMIT:-16}"
          memory: ${DIND_MEMORY_LIMIT:-32g}
    shm_size: ${DIND_SHM_SIZE:-8g}
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: "5"

  # ---------------------------------------------------------------------------
  # GitHub Actions Runner
  # ---------------------------------------------------------------------------
  agent:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    # Give the entrypoint time to call the GitHub deregister API on SIGTERM
    # before SIGKILL hits. Default of 10s frequently isn't enough when:
    #   - a job is running (Runner.Listener waits for it to finish)
    #   - api.github.com has elevated latency
    #   - DNS resolution is slow on first contact
    # Without this, every `compose down` and every `--scale` reduction
    # leaks one offline-runner registration per stopped container.
    stop_grace_period: 120s
    environment:
      # Authentication: Use ACCESS_TOKEN (PAT) or APP_ID/APP_LOGIN (GitHub App)
      # For GitHub App: APP_PRIVATE_KEY is set by docker-compose.app-auth.yml override
      ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN:-}
      APP_ID: ${APP_ID:-}
      APP_LOGIN: ${APP_LOGIN:-}
      # Runner configuration
      # For org runners: Set ORG_NAME (e.g., "bauer-group")
      # For repo runners: Set REPO_URL (e.g., "https://github.com/org/repo")
      ORG_NAME: ${ORG_NAME:-}
      REPO_URL: ${REPO_URL:-}
      RUNNER_SCOPE: ${RUNNER_SCOPE:-org}
      RUNNER_NAME_PREFIX: ${RUNNER_NAME_PREFIX:-self-hosted}
      RUNNER_WORKDIR: ${RUNNER_WORKDIR:-/tmp/runner/work}
      LABELS: ${RUNNER_LABELS:-docker}
      RUNNER_GROUP: ${RUNNER_GROUP:-Default}
      EPHEMERAL: "true"
      DISABLE_AUTO_UPDATE: "false"
      # Docker configuration
      DOCKER_HOST: tcp://docker-in-docker:2375
      DOCKER_TLS_VERIFY: ""
      DOCKER_CERT_PATH: ""
      DOCKER_BUILDKIT: ${DOCKER_BUILDKIT:-1}
      COMPOSE_DOCKER_CLI_BUILD: "1"
      TZ: ${TIME_ZONE:-Etc/UTC}
    volumes:
      - tool-cache:/opt/hostedtoolcache
      # GitHub App private key mount - see docker-compose.app-auth.yml
    networks:
      - runner-network
    depends_on:
      docker-in-docker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'Runner.Listener' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    # No resource limits - Runner agent is lightweight, all work happens in DinD
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Watchtower (optional, profile: auto-update)
  # ---------------------------------------------------------------------------
  # Auto-updates labelled containers on a cron schedule. Opt-in via:
  #   COMPOSE_PROFILES=auto-update
  # Only services tagged with `com.centurylinklabs.watchtower.enable=true`
  # are updated (currently: docker-in-docker). The runner agent has its own
  # in-process self-update mechanism (DISABLE_AUTO_UPDATE=false) and is
  # intentionally NOT labelled, so active jobs are never restarted.
  watchtower:
    image: ${WATCHTOWER_IMAGE:-marrrrrrrrry/watchtower:latest}
    container_name: ${STACK_NAME:-github-runner}-watchtower
    restart: unless-stopped
    profiles:
      - auto-update
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE:-0 0 3 * * 6}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - runner-network
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-50m}
        max-file: "5"

# =============================================================================
# Networks
# =============================================================================
networks:
  runner-network:
    name: ${STACK_NAME:-github-runner}_network
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  dind-data:
    name: ${STACK_NAME:-github-runner}-data
  tool-cache:
    name: ${STACK_NAME:-github-runner}-cache
